<html lang="en">
  <head>
    <meta charset="UTF-8" />

  <body>
    <canvas id="glCanva" width="800" height="600"></canvas>
    <script src="bspline.js"></script>

    <script>

      const canvas = document.getElementById('glCanva');

      const gl = canvas.getContext('webgl2');

      if (!gl) {
            alert('WebGL2 不支援！');
        } else {
            console.log('WebGL2 初始化成功！');
            gl.clearColor(0.2, 0.2, 0.2, 1.0); 
            gl.clear(gl.COLOR_BUFFER_BIT);
      }
      console.log(N(2, 1, 0.5, [0,0,0,1,1,1]));
      
      let knot = [0,0,0,1,1,1];
      let ctrl = [
          [[-1,-1,0], [0,-1,1], [1,-1,0]],
          [[-1, 0,1], [0, 0,2], [1, 0,1]],
          [[-1, 1,0], [0, 1,1], [1, 1,0]]
      ];

      // 算出所有點，存成一個大陣列
      let vertices = [];
      const steps = 30;

      for (let ui = 0; ui <= steps; ui++) {
          for (let vi = 0; vi <= steps; vi++) {
              let u = ui / steps;
              let v = vi / steps;
              let p = surface_point(ctrl, knot, knot, 2, 2, u, v);
              vertices.push(p[0], p[1], p[2]);
          }
      }

      console.log("點的數量:", vertices.length / 3);

    </script>
  </body>
</html>
