<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>B-Spline Surface</title>
</head>
<body>
    <header>
        <h1>B-Spline Surface</h1>
        <p>Tensor Product Patch — degree (2, 2) — 3×3 control points</p>
    </header>

    <div class="main">
        <!-- Canvas -->
        <div class="canvas-wrapper">
            <canvas id="glCanvas"></canvas>
            <div id="label-x" class="axis-label" style="color:#ff6b6b;">X</div>
            <div id="label-y" class="axis-label" style="color:#6bff8e;">Y</div>
            <div id="label-z" class="axis-label" style="color:#6b9fff;">Z</div>
        </div>

        <!-- 控制面板 -->
        <div class="panel">
            <div>
                <div class="panel-title">控制點網格</div>
                <br>
                <!-- 示意圖 -->
                <div class="ctrl-grid">
                    <div class="ctrl-cell fixed">固定</div>
                    <div class="ctrl-cell active">[0][1]</div>
                    <div class="ctrl-cell fixed">固定</div>
                    <div class="ctrl-cell active">[1][0]</div>
                    <div class="ctrl-cell active">[1][1]</div>
                    <div class="ctrl-cell active">[1][2]</div>
                    <div class="ctrl-cell fixed">固定</div>
                    <div class="ctrl-cell active">[2][1]</div>
                    <div class="ctrl-cell fixed">固定</div>
                </div>
            </div>

            <div>
                <div class="panel-title">調整 Z 值</div>
                <br>
                <div class="slider-group">
                    <div class="slider-item">
                        <div class="slider-header">
                            <span class="slider-label">上中 [0][1]</span>
                            <span class="slider-value" id="v01">1.0</span>
                        </div>
                        <input type="range" id="s01" min="-3" max="3" step="0.1" value="1">
                    </div>

                    <div class="slider-item">
                        <div class="slider-header">
                            <span class="slider-label">左中 [1][0]</span>
                            <span class="slider-value" id="v10">1.0</span>
                        </div>
                        <input type="range" id="s10" min="-3" max="3" step="0.1" value="1">
                    </div>

                    <div class="slider-item">
                        <div class="slider-header">
                            <span class="slider-label">中心 [1][1]</span>
                            <span class="slider-value" id="v11">2.0</span>
                        </div>
                        <input type="range" id="s11" min="-3" max="3" step="0.1" value="2">
                    </div>

                    <div class="slider-item">
                        <div class="slider-header">
                            <span class="slider-label">右中 [1][2]</span>
                            <span class="slider-value" id="v12">1.0</span>
                        </div>
                        <input type="range" id="s12" min="-3" max="3" step="0.1" value="1">
                    </div>

                    <div class="slider-item">
                        <div class="slider-header">
                            <span class="slider-label">下中 [2][1]</span>
                            <span class="slider-value" id="v21">1.0</span>
                        </div>
                        <input type="range" id="s21" min="-3" max="3" step="0.1" value="1">
                    </div>
                </div>
            </div>

            <div>
                <div class="panel-title">操作說明</div>
                <br>
                <div class="hint">
                    <span>左鍵拖曳</span> — 旋轉視角<br>
                    <span>滑桿</span> — 調整控制點高度
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl2');

        // canvas 大小跟隨容器
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
            if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
        }
        resizeCanvas();
        window.addEventListener('resize', () => { resizeCanvas(); render(); });

        if (!gl) alert('WebGL2 不支援！');
        else gl.clearColor(0.1, 0.1, 0.18, 1.0);
    </script>
    <script src="bspline.js"></script>
    <script src="webgl.js"></script>
    <script src="interaction.js"></script>
</body>
</html>
